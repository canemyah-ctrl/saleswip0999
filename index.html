<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly WIP — Sales Team</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">

<!-- ============================================================

<script>

  // ── HEADER ──────────────────────────────────────────────────
  const WEEK_NUMBER = "W10";
  const DATE_RANGE  = "Mar 3 – Mar 9 · 2025";

  // ── SECTION 01 · PROS & CONS ────────────────────────────────
  const PROS = [
    "Exceeded weekly target by 18% — strongest performance in Q1 so far",
    "New enterprise deal closed with Acme Corp after 3-month pipeline",
    "Response time to inbound leads improved to under 2 hours",
    "Team morale high after Thursday offsite workshop",
  ];

  const CONS = [
    "Two deals slipped to next week due to procurement delays",
    "CRM data entry lag — entries not logged same-day twice this week",
    "Mid-market segment underperforming vs forecast",
    "Follow-up cadence inconsistent across the team",
  ];

  // ── SECTION 02 · SALES IMAGES ───────────────────────────────
  // 1. Upload your images to an /images folder in the same GitHub repo
  // 2. Add each image here: { src: "images/filename.jpg", caption: "Label" }
  // 3. To remove an image, delete its line or add // in front of it
  const SALES_IMAGES = [
    { src: "images/sale1.jpg", caption: "Acme Corp — $4,200" },
    { src: "images/sale2.jpg", caption: "BluePeak — $1,800" },
    { src: "images/sale3.jpg", caption: "Drift Studio — $950" },
    // { src: "images/sale4.jpg", caption: "Add more here" },
  ];

  // ── SECTION 03 · GOOGLE REVIEWS ─────────────────────────────
  // stars: number from 1 to 5
  const REVIEWS = [
    {
      name:  "James Mitchell",
      stars: 5,
      date:  "Mar 7",
      text:  "Outstanding service from start to finish. The team was incredibly professional and the turnaround time was impressive.",
    },
    {
      name:  "Sofia Laurent",
      stars: 5,
      date:  "Mar 5",
      text:  "Really impressed by how clearly everything was explained. Will definitely recommend to others.",
    },
    {
      name:  "Raj Kumar",
      stars: 4,
      date:  "Mar 4",
      text:  "Great experience overall. Minor wait time at the start but the result was worth it.",
    },
  ];

</script>
<!-- ============================================================
  🚫  STOP HERE — design code lives below, no need to touch it
  ============================================================ -->

<style>
  :root {
    --bg:      #0d0d0d;
    --surface: #161616;
    --surface2:#1e1e1e;
    --border:  #2a2a2a;
    --accent:  #ff108e;
    --accent3: #35c8f1;
    --text:    #f0f0f0;
    --muted:   #888;
    --green:   #22c55e;
    --red:     #ef4444;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; padding:40px 20px; }
  body::before {
    content:''; position:fixed; inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events:none; z-index:0; opacity:0.4;
  }
  .page { max-width:900px; margin:0 auto; position:relative; z-index:1; }

  .header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:56px; padding-bottom:32px; border-bottom:1px solid var(--border); animation:fadeUp .6s ease both; }
  .header-left { display:flex; flex-direction:column; gap:10px; }
  .tag { display:inline-flex; align-items:center; gap:6px; font-family:'Syne',sans-serif; font-size:11px; font-weight:700; letter-spacing:.15em; text-transform:uppercase; color:#fff; background:var(--accent); padding:4px 12px; border-radius:2px; width:fit-content; }
  .title { font-family:'Syne',sans-serif; font-size:clamp(36px,6vw,64px); font-weight:800; line-height:1; letter-spacing:-.03em; }
  .title em { font-style:normal; color:var(--accent); display:block; }
  .meta { display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
  .meta-date { font-family:'Syne',sans-serif; font-size:13px; font-weight:600; color:var(--muted); letter-spacing:.05em; }
  .meta-week { font-family:'Syne',sans-serif; font-size:52px; font-weight:800; color:var(--border); line-height:1; letter-spacing:-.04em; }

  .section-label { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
  .section-num { font-family:'Syne',sans-serif; font-size:11px; font-weight:700; color:var(--accent); letter-spacing:.1em; }
  .section-title { font-family:'Syne',sans-serif; font-size:18px; font-weight:700; letter-spacing:-.01em; }
  .section-divider { flex:1; height:1px; background:var(--border); margin-left:8px; }
  .section { margin-bottom:52px; animation:fadeUp .6s ease both; }
  .section:nth-child(2){animation-delay:.1s} .section:nth-child(3){animation-delay:.2s} .section:nth-child(4){animation-delay:.3s}

  .pros-cons-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:20px 24px; position:relative; overflow:hidden; }
  .card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
  .card.pros::before{background:var(--green)} .card.cons::before{background:var(--red)}
  .card-head { font-family:'Syne',sans-serif; font-size:12px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; margin-bottom:16px; }
  .card.pros .card-head{color:var(--green)} .card.cons .card-head{color:var(--red)}
  .list-item { display:flex; align-items:flex-start; gap:10px; margin-bottom:12px; font-size:14px; line-height:1.5; color:#ccc; }
  .list-item:last-child{margin-bottom:0}
  .dot { width:6px; height:6px; border-radius:50%; margin-top:6px; flex-shrink:0; }
  .pros .dot{background:var(--green)} .cons .dot{background:var(--red)}

  .sales-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
  .img-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; overflow:hidden; transition:border-color .2s; }
  .img-card:hover{border-color:var(--accent)}
  .img-card img { width:100%; aspect-ratio:4/3; object-fit:cover; display:block; }
  .img-caption { padding:8px 12px; font-size:11px; color:var(--muted); letter-spacing:.04em; border-top:1px solid var(--border); }
  .img-missing { width:100%; aspect-ratio:4/3; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:11px; color:var(--muted); text-align:center; padding:12px; }

  .reviews-grid { display:flex; flex-direction:column; gap:14px; }
  .review-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:18px 22px; display:grid; grid-template-columns:auto 1fr auto; gap:16px; align-items:start; transition:border-color .2s; }
  .review-card:hover{border-color:var(--accent3)}
  .review-avatar { width:38px; height:38px; border-radius:50%; background:var(--surface2); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-family:'Syne',sans-serif; font-weight:700; font-size:14px; color:var(--accent3); flex-shrink:0; }
  .review-body { display:flex; flex-direction:column; gap:6px; }
  .review-name { font-family:'Syne',sans-serif; font-size:13px; font-weight:700; }
  .review-text { font-size:13px; color:#aaa; line-height:1.6; }
  .stars { color:#f5c518; font-size:13px; letter-spacing:1px; }
  .review-date { font-size:11px; color:var(--muted); padding-top:2px; }

  .footer { margin-top:56px; padding-top:24px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; animation:fadeUp .6s .4s ease both; }
  .footer-brand { font-family:'Syne',sans-serif; font-size:11px; font-weight:700; letter-spacing:.1em; color:var(--muted); text-transform:uppercase; }
  .footer-pill { display:flex; gap:8px; }
  .pill { font-size:11px; padding:4px 10px; border-radius:20px; border:1px solid var(--border); color:var(--muted); }

  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

  @media(max-width:600px) {
    .pros-cons-grid{grid-template-columns:1fr}
    .sales-grid{grid-template-columns:repeat(2,1fr)}
    .header{flex-direction:column;gap:16px}
    .meta{align-items:flex-start}
    .meta-week{font-size:36px}
  }
</style>
</head>
<body>
<div class="page" id="app"></div>

<script>
  // ── RENDER (do not edit) ─────────────────────────────────────

  function starsHtml(n) {
    return '★'.repeat(n) + '☆'.repeat(5 - n);
  }

  function initials(name) {
    return name.trim().split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }

  function renderList(items) {
    return items.map(text =>
      `<div class="list-item"><div class="dot"></div><span>${text}</span></div>`
    ).join('');
  }

  function renderImages(images) {
    if (!images.length) return `<p style="color:var(--muted);font-size:13px;padding:16px 0">No images yet — add entries to SALES_IMAGES above.</p>`;
    return images.map(img => `
      <div class="img-card">
        <img src="${img.src}" alt="${img.caption}"
          onerror="this.outerHTML='<div class=\\'img-missing\\'>Image not found:<br>${img.src}</div>'">
        ${img.caption ? `<div class="img-caption">${img.caption}</div>` : ''}
      </div>`
    ).join('');
  }

  function renderReviews(reviews) {
    return reviews.map(r => `
      <div class="review-card">
        <div class="review-avatar">${initials(r.name)}</div>
        <div class="review-body">
          <div class="review-name">${r.name}</div>
          <div class="stars">${starsHtml(r.stars)}</div>
          <div class="review-text">${r.text}</div>
        </div>
        <div class="review-date">${r.date}</div>
      </div>`
    ).join('');
  }

  document.getElementById('app').innerHTML = `

    <div class="header">
      <div class="header-left">
        <div class="tag">📋 Sales WIP</div>
        <h1 class="title">Weekly<em>Wrap</em></h1>
      </div>
      <div class="meta">
        <div class="meta-date">${DATE_RANGE}</div>
        <div class="meta-week">${WEEK_NUMBER}</div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">
        <span class="section-num">01</span>
        <span class="section-title">Pros &amp; Cons of the Week</span>
        <div class="section-divider"></div>
      </div>
      <div class="pros-cons-grid">
        <div class="card pros">
          <div class="card-head">✦ Wins</div>
          ${renderList(PROS)}
        </div>
        <div class="card cons">
          <div class="card-head">✦ Challenges</div>
          ${renderList(CONS)}
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">
        <span class="section-num">02</span>
        <span class="section-title">Sales Made This Week</span>
        <div class="section-divider"></div>
      </div>
      <div class="sales-grid">
        ${renderImages(SALES_IMAGES)}
      </div>
    </div>

    <div class="section">
      <div class="section-label">
        <span class="section-num">03</span>
        <span class="section-title">Google Reviews This Week</span>
        <div class="section-divider"></div>
      </div>
      <div class="reviews-grid">
        ${renderReviews(REVIEWS)}
      </div>
    </div>

    <div class="footer">
      <div class="footer-brand">Sales Team · WIP</div>
      <div class="footer-pill">
        <div class="pill">${DATE_RANGE}</div>
        <div class="pill">${WEEK_NUMBER}</div>
      </div>
    </div>

  `;
</script>
</body>
</html>
